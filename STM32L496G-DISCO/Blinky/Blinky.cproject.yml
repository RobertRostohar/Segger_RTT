# A project translates into one executable or library.
project:

  define:
    - USE_SEGGER_SYSVIEW
    - SEGGER_SYSVIEW_RTT_CHANNEL: 1
    # - SEGGER_SYSVIEW_START_ON_INIT: 1

  # List components to use for your application.
  # A software component is a re-usable unit that may be configurable.
  components:
    - component: Device:CubeMX

    - component: CMSIS:CORE

    - component: CMSIS:OS Tick:SysTick
    - component: CMSIS:RTOS2:Keil RTX5&Source

    - component: CMSIS-Compiler:CORE
    - component: CMSIS-Compiler:STDIN:RTT
    - component: CMSIS-Compiler:STDOUT:RTT
    - component: CMSIS-Compiler:STDERR:RTT

    - component: CMSIS Driver:GPIO
    - component: CMSIS Driver:USART
    - component: CMSIS Driver:VIO:Board
    - component: SEGGER:RTT
    - component: SEGGER:SystemView&NoOS

  # List of source groups and files added to a project or a layer.
  groups:
    - group: Documentation
      files:
        - file: README.md
    - group: Source Files
      files:
        - file: Blinky.c

  linker:
    - script:  ./RTE/Device/STM32L496AGIx/ac6_linker_script.sct.src
      regions: ./RTE/Device/STM32L496AGIx/regions_STM32L496G-DISCO.h
      for-compiler: AC6

  # List executable file formats to be generated.
  output:
    type:
      - bin
      - elf
      - hex
      - map
