# A solution is a collection of related projects that share same base configuration.
solution:
  created-for: CMSIS-Toolbox@2.12.0
  cdefault:

  # List of tested compilers that can be selected
  select-compiler:
    - compiler: AC6

  compiler: AC6

  # List the packs that define the device and/or board.
  packs:
    - pack: Keil::STM32L4xx_DFP@>=3.0.0-0
    - pack: Keil::STM32L4R9I-DISCO_BSP@>=1.0.0-0
    - pack: ARM::CMSIS-Driver_STM32@>=1.0.0-0
    - pack: ARM::CMSIS@>=6.0.0
    - pack: ARM::CMSIS-Compiler@>=2.0.0
    - pack: ARM::CMSIS-RTX@>=5.9.0
    - pack: SEGGER::RTT@>=8.58.0
    - pack: SEGGER::SystemView@>=4.12.0

  # List different hardware targets that are used to deploy the solution.
  target-types:
    - type: STM32L4R9I-DISCO
      board: STMicroelectronics::STM32L4R9I-DISCO
      device: STMicroelectronics::STM32L4R9AIIx
      target-set:
        - set:
          images:
            - project-context: Blinky.Debug
          debugger:
            name: ST-Link@pyOCD
            clock: 4000000
            protocol: swd
            rtt:
              - channel:
                  - number: 0
                    mode: stdio
                  - number: 1
                    mode: systemview
            telnet:
              - mode: console

  # List of different build configurations.
  build-types:
    - type: Debug
      debug: on
      optimize: debug

    - type: Release
      debug: off
      optimize: balanced

  # List related projects.
  projects:
    - project: Blinky.cproject.yml
